global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'inventory-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['inventory-service:8080']
        labels:
          application: 'inventory-service'

  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8888']
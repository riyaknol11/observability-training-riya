spring:
  application:
    name: inventory-service

server:
  port: 8080
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  config: classpath:logback-spring.xml